<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Librería Teruel Ayala</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Librería Teruel Ayala</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/busqueda}">Búsqueda</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin}">Admin</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="p-4 mb-4 bg-light rounded">
        <h1>Bienvenido a Librería Teruel Ayala</h1>
        <p class="lead">Encuentra tu próxima lectura</p>
        <a th:href="@{/busqueda}" class="btn btn-dark">Buscar libros</a>
    </div>

    <!-- ultimos 5 libros añadidos -->
    <h2 class="mb-3">Últimas incorporaciones</h2>
    <div class="row">
        <div class="col-md-2 mb-4" th:each="libro : ${libros}">
            <a th:href="@{/libro/{isbn}(isbn=${libro.isbn})}" class="text-decoration-none text-dark">
                <div class="card h-100">
                    <img th:if="${libro.portada != null}"
                         th:src="${libro.portada}"
                         class="card-img-top" alt="portada">
                    <img th:unless="${libro.portada != null}"
                         th:src="@{/img/sin-portada.jpg}"
                         class="card-img-top" alt="sin portada">
                    <div class="card-body">
                        <h6 class="card-title" th:text="${libro.titulo}"></h6>
                        <p class="card-text text-muted small"
                           th:each="autor : ${libro.autores}"
                           th:text="${autor.nombre}"></p>
                    </div>
                </div>
            </a>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
