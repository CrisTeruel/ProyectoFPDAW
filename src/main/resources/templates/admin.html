<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin - Librería Teruel Ayala</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" th:href="@{/}">Librería Teruel Ayala</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/busqueda}">Búsqueda</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" th:href="@{/admin}">Admin</a>
        </li>
        <li class="nav-item">
          <!-- boton de cerrar sesion -->
          <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-outline-light btn-sm ms-2">
              Cerrar sesión
            </button>
          </form>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">

  <h2 class="mb-4">Panel de administración</h2>

  <!-- mensajes de ok o error -->
  <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <!-- formulario añadir libro -->
  <div class="card mb-4">
    <div class="card-header">Añadir libro</div>
    <div class="card-body">
      <form th:action="@{/admin/añadir}" method="post" class="row g-3">
        <div class="col-md-4">
          <input type="text" name="isbn" class="form-control"
                 placeholder="ISBN-10 o ISBN-13" required>
        </div>
        <div class="col-md-2">
          <button type="submit" class="btn btn-success w-100">Añadir</button>
        </div>
      </form>
    </div>
  </div>

  <!-- tabla de libros -->
  <h5>Libros en stock (<span th:text="${#lists.size(libros)}"></span> libros)</h5>
  <table class="table table-striped">
    <thead>
    <tr>
      <th>ISBN</th>
      <th>Título</th>
      <th>Autor/es</th>
      <th>Editorial</th>
      <th>Fecha</th>
      <th></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="libro : ${libros}">
      <td th:text="${libro.isbn}"></td>
      <td th:text="${libro.titulo}"></td>
      <td>
                        <span th:each="autor : ${libro.autores}"
                              th:text="${autor.nombre} + ' '"></span>
      </td>
      <td th:text="${libro.editorial.nombre}"></td>
      <td th:text="${libro.fechaPublicacion}"></td>
      <td>
        <form th:action="@{/admin/borrar}" method="post">
          <input type="hidden" name="isbn" th:value="${libro.isbn}">
          <button type="submit" class="btn btn-danger btn-sm">Borrar</button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
