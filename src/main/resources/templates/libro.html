<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${libro.titulo} + ' - Librería Teruel Ayala'">Detalle libro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Librería Teruel Ayala</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/busqueda}">Búsqueda</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin}">Admin</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <a th:href="@{/busqueda}" class="btn btn-secondary mb-3">← Volver a búsqueda</a>

    <div class="row">

        <!-- portada -->
        <div class="col-md-3">
            <img th:if="${libro.portada != null}"
                 th:src="${libro.portada}"
                 class="img-fluid rounded" alt="portada">
            <img th:unless="${libro.portada != null}"
                 th:src="@{/img/sin-portada.jpg}"
                 class="img-fluid rounded" alt="sin portada">
        </div>

        <!-- info del libro -->
        <div class="col-md-9">
            <h2 th:text="${libro.titulo}"></h2>

            <p>
                <strong>Autor/es:</strong>
                <span th:each="autor, iterStat : ${libro.autores}">
                        <span th:text="${autor.nombre}"></span>
                        <span th:unless="${iterStat.last}">, </span>
                    </span>
            </p>

            <p>
                <strong>Editorial:</strong>
                <span th:text="${libro.editorial.nombre}"></span>
            </p>

            <p>
                <strong>Fecha de publicación:</strong>
                <span th:text="${libro.fechaPublicacion}"></span>
            </p>

            <p>
                <strong>ISBN:</strong>
                <span th:text="${libro.isbn}"></span>
            </p>

            <p>
                <strong>Categorías:</strong>
                <span th:each="categoria, iterStat : ${libro.categorias}">
                        <span th:text="${categoria.nombre}"></span>
                        <span th:unless="${iterStat.last}">, </span>
                    </span>
            </p>

            <hr>

            <p><strong>Sinopsis:</strong></p>
            <p th:text="${libro.descripcion}"></p>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
